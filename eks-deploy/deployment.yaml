apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-demo
  labels:
    app: platform-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: platform-demo
  template:
    metadata:
      labels:
        app: platform-demo
    spec:
      containers:
        - name: platform-demo-container
          image: 462016340186.dkr.ecr.us-east-2.amazonaws.com/demo/platform-engineering-demo:latest
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"