apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.labels.app }}-service
  annotations:
{{ toYaml .Values.annotations.service | indent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    app: {{ .Values.labels.app }}
  ports:
    - protocol: TCP
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}