app:
  name: platform-demo
  port: 3000

replicaCount: 1

image:
  repository: ""
  tag: ""
  pullPolicy: IfNotPresent

service:
  type: LoadBalancer
  port: 80
  targetPort: 3000

env: dev

environments:
  dev:
    namespace: dev
  prod:
    namespace: prod

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "200m"
    memory: "256Mi"

nodeSelector:
  karpenter.sh/nodepool: general-purpose

annotations:
  service:
    service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing